name: ci

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      BASE_URL: ${{ vars['ORANGEHRM_BASE_URL'] || 'https://opensource-demo.orangehrmlive.com' }}
      ADMIN_USER: ${{ secrets['ORANGEHRM_ADMIN_USER'] }}
      ADMIN_PASS: ${{ secrets['ORANGEHRM_ADMIN_PASS'] }}
      HEADLESS: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Cache npm
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: npm-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            npm-${{ runner.os }}-

      - name: Validate required CI environment
        run: |
          if [ -z "$ADMIN_USER" ] || [ -z "$ADMIN_PASS" ]; then
            echo "Missing ORANGEHRM_ADMIN_USER/ORANGEHRM_ADMIN_PASS secrets."
            exit 1
          fi

      - uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - run: npm ci
      - name: Check formatting (Prettier)
        run: npx prettier --check .
      - run: npx playwright install --with-deps chromium
      - run: npm run lint
      - run: npm run lint:types
      - run: npm run test:smoke

      - if: failure()
        run: npm run test:smoke:retry

      - name: Generate flaky summary
        if: always()
        run: |
          node -e "const fs=require('fs');const p='test-results/smoke-report.json'; if(!fs.existsSync(p)){console.log('no smoke report'); process.exit(0);} const data=JSON.parse(fs.readFileSync(p)); const summary={total:0,failed:[],passed:[]}; for(const f of data){ for(const el of f.elements||[]){ summary.total++; const hasFailed = (el.steps||[]).some(s=>s.result&&s.result.status==='failed'); const rec={id:el.id||el.name, name:el.name, tags: (el.tags||[]).map(t=>t.name)}; if(hasFailed) summary.failed.push(rec); else summary.passed.push(rec); }} fs.mkdirSync('test-results',{recursive:true}); fs.writeFileSync('test-results/flaky-summary.json',JSON.stringify(summary,null,2)); console.log('flaky summary written to test-results/flaky-summary.json');"

      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results
          if-no-files-found: ignore

      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report
          if-no-files-found: ignore
